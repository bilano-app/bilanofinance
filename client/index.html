<!DOCTYPE html>
<html lang="id">
  <style>
    /* Mengecilkan semua elemen secara proporsional khusus di HP */
    @media (max-width: 768px) {
      html {
        font-size: 13px !important; /* Standar web biasanya 16px, kita padatkan ke 13px */
      }
    }
    
    /* Membuat aplikasi tidak bisa di-blok/copy teksnya agar terasa seperti aplikasi asli */
    body {
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    
    /* Izinkan input teks agar tetap bisa diketik */
    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }
  </style>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>BILANO - Keuangan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script>
      function median_onesignal_info(info) {
          if (info && info.oneSignalUserId) {
              const idAntena = info.oneSignalUserId;
              const email = localStorage.getItem("bilano_email") || "guest";
              
              // Kirim ID Antena Native HP Bos ke Database Server BILANO
              fetch('/api/user/onesignal', {
                  method: 'POST',
                  headers: { 
                      'Content-Type': 'application/json', 
                      'x-user-email': email 
                  },
                  body: JSON.stringify({ onesignalId: idAntena })
              }).then(() => {
                  console.log("✅ Antena Native Median Berhasil Terhubung!");
              }).catch(err => console.error("Gagal lapor database", err));
          }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

  </body>
